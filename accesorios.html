<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesorios | San Miguel Import Export</title>
  <link rel="icon" href="logo.png">

  <style>
    * { box-sizing: border-box; scroll-behavior: smooth; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #071426;
      color: white;
      padding: 15px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { height: 60px; }
    .logo-text { color: #d8a43a; font-weight: bold; font-size: 22px; }

    nav { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
    nav a { color: white; text-decoration: none; font-weight: bold; }

    .lang-buttons button {
      background: transparent;
      border: 1px solid #d8a43a;
      color: white;
      cursor: pointer;
      padding: 6px 10px;
      font-weight: bold;
      border-radius: 4px;
    }

    .hero {
      background:
        linear-gradient(rgba(7,20,38,.78), rgba(7,20,38,.78)),
        url("https://images.unsplash.com/photo-1486262715619-67b85e0b08d3") center/cover;
      color: white;
      padding: 80px 8%;
      text-align: center;
    }

    .hero h1 { font-size: 46px; margin-bottom: 10px; }
    .hero p { font-size: 20px; }

    .section { padding: 50px 8%; }

    .section h2 {
      color: #071426;
      border-bottom: 4px solid #d8a43a;
      display: inline-block;
      margin-bottom: 25px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,.1);
      border-top: 4px solid #d8a43a;
    }

    .card h3 {
      margin: 0 0 10px;
      color: #071426;
    }

    .card p {
      color: #555;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      background: #d8a43a;
      color: #071426;
      padding: 10px 15px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
    }

    footer {
      background: #071426;
      color: white;
      text-align: center;
      padding: 22px;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 5px 15px rgba(0,0,0,.3);
    }

    @media(max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      header { gap: 15px; }
      .hero h1 { font-size: 34px; }
    }
  </style>
</head>

<body>

<header>
  <div class="brand">
    <img src="logo.png" alt="San Miguel">
    <div class="logo-text">San Miguel</div>
  </div>

  <nav>
    <a href="index.html" data-i18n="navHome">Inicio</a>
    <a href="motores.html" data-i18n="navEngines">Motores</a>
    <a href="index.html#contacto" data-i18n="navContact">Contacto</a>

    <div class="lang-buttons">
      <button onclick="setLang('es')">ES</button>
      <button onclick="setLang('en')">EN</button>
    </div>
  </nav>
</header>

<section class="hero">
  <h1 data-i18n="pageTitle">Accesorios y partes automotrices</h1>
  <p data-i18n="pageSubtitle">Accesorios disponibles para importación y envío bajo pedido</p>
</section>

<section class="section">
  <h2 data-i18n="catalogTitle">Catálogo de accesorios</h2>

  <div class="grid" id="accessoriesGrid"></div>
</section>

<footer>
  <p data-i18n="footerText">© 2026 San Miguel Import Export. Todos los derechos reservados.</p>
</footer>

<a class="whatsapp" href="https://wa.me/16893090939?text=Hola%20quiero%20cotizar%20un%20accesorio" target="_blank">💬</a>

<script>
const translations = {
  es: {
    navHome: "Inicio",
    navEngines: "Motores",
    navContact: "Contacto",
    pageTitle: "Accesorios y partes automotrices",
    pageSubtitle: "Accesorios disponibles para importación y envío bajo pedido",
    catalogTitle: "Catálogo de accesorios",
    quote: "Cotizar este accesorio",
    footerText: "© 2026 San Miguel Import Export. Todos los derechos reservados.",
    desc: "Disponible bajo pedido para importación y envío."
  },
  en: {
    navHome: "Home",
    navEngines: "Engines",
    navContact: "Contact",
    pageTitle: "Automotive accessories and parts",
    pageSubtitle: "Accessories available for import and shipping by request",
    catalogTitle: "Accessories catalog",
    quote: "Request quote",
    footerText: "© 2026 San Miguel Import Export. All rights reserved.",
    desc: "Available by request for import and shipping."
  }
};

const accessories = {
  es: [
    "Cañas de volante",
    "Compresores",
    "Arranques",
    "Bombas de dirección",
    "Electro ventiladores",
    "Hidrovac para frenos",
    "Aros o rings",
    "Llantas o cauchos",
    "Módulos para motores",
    "Módulos para transmisiones",
    "Tren delanteros",
    "Diferenciales"
  ],
  en: [
    "Steering columns",
    "Compressors",
    "Starters",
    "Power steering pumps",
    "Electric fans",
    "Brake boosters",
    "Rims or rings",
    "Tires",
    "Engine control modules",
    "Transmission modules",
    "Front suspension assemblies",
    "Differentials"
  ]
};

function renderAccessories(lang) {
  const grid = document.getElementById("accessoriesGrid");
  grid.innerHTML = "";

  accessories[lang].forEach((item) => {
    const message = lang === "en"
      ? `Hello%20I%20would%20like%20to%20request%20a%20quote%20for%20${encodeURIComponent(item)}`
      : `Hola%20quiero%20cotizar%20${encodeURIComponent(item)}`;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h3>${item}</h3>
      <p>${translations[lang].desc}</p>
      <a class="btn" href="https://wa.me/16893090939?text=${message}" target="_blank">${translations[lang].quote}</a>
    `;
    grid.appendChild(card);
  });
}

function setLang(lang) {
  document.documentElement.lang = lang;
  localStorage.setItem("siteLang", lang);

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    el.textContent = translations[lang][key];
  });

  const generalMessage = lang === "en"
    ? "Hello%20I%20would%20like%20to%20request%20a%20quote%20for%20an%20automotive%20accessory"
    : "Hola%20quiero%20cotizar%20un%20accesorio%20automotriz";

  document.querySelector(".whatsapp").href = `https://wa.me/16893090939?text=${generalMessage}`;

  renderAccessories(lang);
}

setLang(localStorage.getItem("siteLang") || "es");
</script>

</body>
</html>
